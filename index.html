<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;

body{
    background: linear-gradient(180deg,#2d8cff,#1e3c72);
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
}

.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    transition: transform 0.4s ease;
}

.profile img:hover{
    transform: scale(1.08) rotate(2deg);
}

h1{
    margin-bottom:10px;
}

.bio{
    font-size:14px;
    margin-bottom:25px;
}

/* 🔥 Animated Buttons */
.link{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    text-decoration:none;
    color:#fff;
    border-radius:30px;
    padding:15px;
    margin:12px 0;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.5);
    transition: all 0.3s ease;
}

/* Gradient glow effect */
.link::before{
    content:"";
    position:absolute;
    width:0%;
    height:100%;
    top:0;
    left:0;
    background: linear-gradient(90deg,#ff512f,#dd2476);
    transition:0.4s ease;
    z-index:0;
}

.link span{
    position:relative;
    z-index:1;
}

.link i{
    position:relative;
    z-index:1;
    font-size:20px;
    transition: transform 0.3s ease;
}

/* Hover Effects */
.link:hover::before{
    width:100%;
}

.link:hover{
    transform: translateY(-5px) scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.link:hover i{
    transform: rotate(10deg) scale(1.2);
}

/* Click effect */
.link:active{
    transform: scale(0.96);
}
</style>
